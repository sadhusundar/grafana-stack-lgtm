auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level: info

common:
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

ingester:
  wal:
    # WAL inside the mounted volume (/loki maps to /data/loki on host)
    # Avoids "mkdir /wal: permission denied" error
    dir: /loki/wal

storage_config:
  aws:
    region: ${AWS_REGION}
    bucketnames: ${S3_BUCKET}
    s3forcepathstyle: false
  boltdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/cache
    # shared_store REMOVED — field removed in Loki 3.x

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: s3
      schema: v13
      index:
        prefix: loki/index_
        period: 24h

compactor:
  working_directory: /loki/compactor
  delete_request_store: s3        # required when retention_enabled=true in Loki 3.x
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  # shared_store REMOVED — field removed in Loki 3.x

limits_config:
  retention_period: 720h
  reject_old_samples: true
  reject_old_samples_max_age: 720h   # wide window prevents WAL replay rejections
  creation_grace_period: 10m
  max_entries_limit_per_query: 10000
  ingestion_rate_mb: 64
  ingestion_burst_size_mb: 128
  allow_structured_metadata: false   # required for boltdb-shipper (not tsdb)

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 256

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://localhost:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true
